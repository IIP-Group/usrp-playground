<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logs — USRP Sandbox</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
        <div class="row" style="margin-bottom: 20px;">
            <h2 style="margin: 0;">Logs</h2>
            <span class="sp"></span>
            <span class="text-dim" id="log-count"></span>
        </div>

        <div class="toolbar">
            <select id="filter-action">
                <option value="">All actions</option>
                <option value="submit">submit</option>
                <option value="download">download</option>
                <option value="cancelled">cancelled</option>
                <option value="auth_failed">auth_failed</option>
                <option value="queue_full">queue_full</option>
                <option value="task_error">task_error</option>
                <option value="file_too_large">file_too_large</option>
            </select>
            <select id="filter-limit">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="200">200</option>
                <option value="500">500</option>
            </select>
            <button id="btn-refresh" class="btn">Reload</button>
            <label><input type="checkbox" id="auto-refresh" checked> Auto-refresh</label>
            <span class="sp"></span>
            <button id="btn-bulk-delete" class="btn btn-danger" disabled>Delete selected</button>
            <button id="btn-delete-all" class="btn btn-danger">Delete all logs</button>
        </div>

        <div class="scroll-region">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="select-all" class="big-check"></th>
                        <th>Time</th>
                        <th>User</th>
                        <th>Action</th>
                        <th class="num">Samples</th>
                        <th>IP</th>
                        <th>Detail</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <tr><td colspan="7" class="empty">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
<script>
initShell("logs");

let allLogs = [];
let selected = new Set();

async function loadLogs() {
    const action = document.getElementById("filter-action").value;
    const limit = document.getElementById("filter-limit").value;
    const qs = new URLSearchParams({limit});
    if (action) qs.set("action", action);
    try {
        allLogs = await apiFetch(`/logs?${qs.toString()}`);
        render();
    } catch (e) { toast(e.message, "err"); }
}

function actionBadge(a) {
    const map = {
        submit:      "ok",
        download:    "ok",
        cancelled:   "warn",
        auth_failed: "err",
        task_error:  "err",
        queue_full:  "warn",
        file_too_large: "warn",
    };
    const cls = map[a] || "";
    return `<span class="badge ${cls}"><span class="dot"></span>${esc(a)}</span>`;
}

function render() {
    document.getElementById("log-count").textContent = `${allLogs.length} entries`;
    const body = document.getElementById("logs-body");
    if (!allLogs.length) {
        body.innerHTML = '<tr><td colspan="7" class="empty">No logs</td></tr>';
        updateBulk();
        return;
    }
    body.innerHTML = allLogs.map(l => {
        const checked = selected.has(l.id) ? "checked" : "";
        return `<tr>
            <td><input type="checkbox" class="row-check big-check" data-id="${l.id}" ${checked}></td>
            <td class="text-dim nowrap">${relTime(l.created_at)}</td>
            <td>${esc(l.eth_id) || '<span class="text-dim">–</span>'}</td>
            <td>${actionBadge(l.action)}</td>
            <td class="num">${l.n_samples ? l.n_samples.toLocaleString() : '–'}</td>
            <td class="mono text-dim">${esc(l.ip || "–")}</td>
            <td class="text-dim">${esc(l.detail || "")}</td>
        </tr>`;
    }).join("");

    body.querySelectorAll(".row-check").forEach(cb => {
        cb.addEventListener("change", (e) => {
            const id = Number(e.target.dataset.id);
            if (e.target.checked) selected.add(id);
            else selected.delete(id);
            updateBulk();
        });
    });
    updateBulk();
}

function updateBulk() {
    const n = selected.size;
    const btn = document.getElementById("btn-bulk-delete");
    btn.disabled = !n;
    btn.textContent = n ? `Delete ${n}` : "Delete selected";

    const selAll = document.getElementById("select-all");
    if (allLogs.length) {
        selAll.checked = allLogs.every(l => selected.has(l.id));
        selAll.indeterminate = !selAll.checked && allLogs.some(l => selected.has(l.id));
    } else {
        selAll.checked = false;
    }
}

document.getElementById("select-all").addEventListener("change", (e) => {
    if (e.target.checked) allLogs.forEach(l => selected.add(l.id));
    else allLogs.forEach(l => selected.delete(l.id));
    render();
});

document.getElementById("btn-bulk-delete").addEventListener("click", async () => {
    const n = selected.size;
    if (!n) return;
    const pw = await askPassword(`${n} log entry/entries will be deleted. Enter password to confirm:`);
    if (pw === null) return;
    try {
        const r = await apiFetch("/logs/bulk", {method: "POST", body: JSON.stringify({
            action: "delete",
            ids: [...selected],
            password: pw,
        })});
        selected.clear(); toast(`${r.count} log(s) deleted`, "ok"); loadLogs();
    } catch (e) { toast(e.message, "err"); }
});

document.getElementById("btn-delete-all").addEventListener("click", async () => {
    const pw = await askPassword("ALL logs will be deleted. Enter password to confirm:");
    if (pw === null) return;
    try {
        const r = await apiFetch("/logs/bulk", {method: "POST", body: JSON.stringify({
            action: "delete_all",
            password: pw,
        })});
        selected.clear(); toast(`${r.count} log(s) deleted`, "ok"); loadLogs();
    } catch (e) { toast(e.message, "err"); }
});

document.getElementById("btn-refresh").addEventListener("click", loadLogs);
document.getElementById("filter-action").addEventListener("change", loadLogs);
document.getElementById("filter-limit").addEventListener("change", loadLogs);

loadLogs();
setInterval(() => {
    if (document.getElementById("auto-refresh").checked && selected.size === 0) loadLogs();
}, 5000);
</script>
</body>
</html>
