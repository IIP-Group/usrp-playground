<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0c2f1a">
    <title>USRP Sandbox — Status</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, sans-serif;
            background: #000;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        /* ====================================================== */
        /*  Stage palettes — DAY (running) and NIGHT (sleeping)   */
        /* ====================================================== */
        .stage {
            position: fixed;
            inset: 0;
            overflow: hidden;
            transition:
                background 1.2s ease,
                color 1.2s ease;
        }

        /* DAY — savannah at golden hour */
        .stage.running {
            --sky-top:    #ffb55a;
            --sky-mid:    #f57f3a;
            --sky-bot:    #c95a2c;
            --sun:        #fff0c1;
            --sun-glow:   #ffd97a;
            --mtn-far:    #6b3a4e;
            --mtn-near:   #4a2438;
            --tree-far:   #2c1322;
            --tree-near:  #1a0c14;
            /* three ground tiers, lightest at the back, darkest in front */
            --ground-back:  #d49866;
            --ground-mid:   #8c5a2c;
            --ground-front: #2e1404;
            --grass-back:   #8a5e2e;
            --grass-mid:    #5a3a18;
            --animal-1:  #b88a4a;     /* giraffe sand */
            --animal-1b: #6e4a1c;     /* giraffe spots */
            --animal-2:  #4a4a52;     /* elephant grey */
            --animal-3:  #d8b878;     /* zebra body */
            --animal-3b: #1c1410;     /* zebra stripes */
            --animal-4:  #c46438;     /* lion */
            --animal-4b: #6e3010;     /* mane */
            --label-fg:  #fff8e6;
            --label-glow:#ffd97a;
            background: linear-gradient(180deg,
                        var(--sky-top) 0%,
                        var(--sky-mid) 45%,
                        var(--sky-bot) 100%);
        }

        /* NIGHT — moonlit savannah */
        .stage.down {
            --sky-top:   #1d2c5e;
            --sky-mid:   #2c3e75;
            --sky-bot:   #1f2d54;
            --sun:       #f5efd8;
            --sun-glow:  #c8d2f5;
            --mtn-far:   #354670;
            --mtn-near:  #283557;
            --tree-far:  #182240;
            --tree-near: #0e1530;
            --ground-back:  #4a5e8a;
            --ground-mid:   #2a3a5e;
            --ground-front: #101c38;
            --grass-back:   #3a4c74;
            --grass-mid:    #283b5e;
            --animal-1:  #5b6c92;
            --animal-1b: #2c3a5c;
            --animal-2:  #4a5570;
            --animal-3:  #6a7898;
            --animal-3b: #1a2240;
            --animal-4:  #5d6788;
            --animal-4b: #2e3a58;
            --label-fg:  #e8eefd;
            --label-glow:#8aa5e0;
            background: linear-gradient(180deg,
                        var(--sky-top) 0%,
                        var(--sky-mid) 60%,
                        var(--sky-bot) 100%);
        }

        /* loading */
        .stage.unknown {
            --sky-top: #1a1d28; --sky-mid: #2a3340; --sky-bot: #181b24;
            --sun: #b6cbf5;     --sun-glow: #5b8def;
            --mtn-far: #2a2f3d; --mtn-near: #1f232e;
            --tree-far: #181b24; --tree-near: #0f1117;
            --ground-back: #2a3340; --ground-mid: #1a1d28; --ground-front: #0a0c12;
            --grass-back: #2a3340; --grass-mid: #1a1d28;
            --animal-1: #3a4252; --animal-1b: #2a3340;
            --animal-2: #2c3340; --animal-3: #3a4252; --animal-3b: #1a1d28;
            --animal-4: #3a4252; --animal-4b: #2a3340;
            --label-fg: #c9d4ec; --label-glow: #5b8def;
            background: linear-gradient(180deg, #181b24 0%, #0f1117 100%);
        }

        /* ============================== */
        /*  Layered scene SVG container   */
        /* ============================== */
        .scene {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* sun/moon glow */
        .celestial {
            transform-origin: center;
            animation: float 9s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-8px); }
        }

        /* stars — only visible at night */
        .star {
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        .stage.down .star { opacity: 0.9; }
        @keyframes twinkle {
            0%,100% { opacity: 0.3; }
            50%     { opacity: 1; }
        }

        /* parallax: each layer scrolls at its own speed (running mode only) */
        .layer { transform: translateX(0); }
        .stage.running .layer-mtn       { animation: scroll-x 90s linear infinite; }
        .stage.running .layer-tree      { animation: scroll-x 50s linear infinite; }
        .stage.running .layer-grass-back{ animation: scroll-x 32s linear infinite; }
        .stage.running .layer-grass-mid { animation: scroll-x 22s linear infinite; }
        .stage.running .layer-fg        { animation: scroll-x 12s linear infinite; }
        @keyframes scroll-x {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }     /* SVG patterns are tiled 2× */
        }

        /* clouds drifting */
        .cloud { opacity: 0.65; }
        .stage.running .cloud { animation: cloud-drift 80s linear infinite; }
        .stage.down .cloud { opacity: 0; }
        @keyframes cloud-drift {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-1200px); }
        }

        /* =================== */
        /*    ANIMAL PARTS     */
        /* =================== */

        /* swap day/night animal poses */
        .pose-running { display: inline; }
        .pose-sleeping { display: none; }
        .stage.down .pose-running   { display: none; }
        .stage.down .pose-sleeping  { display: inline; }
        .stage.unknown .pose-running { opacity: 0.4; }

        /* body bobs gently while running */
        .body-bob {
            transform-origin: center;
            animation: bob 0.55s ease-in-out infinite;
        }
        .body-bob.slow   { animation-duration: 0.85s; }
        .body-bob.fast   { animation-duration: 0.42s; }
        .stage.down .body-bob { animation: none; }
        @keyframes bob {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-3px); }
        }

        /* legs cycle — generic pendulum.
           Apply on a <g> so leg + stripes/hooves rotate together. */
        .leg {
            transform-box: fill-box;
            transform-origin: top center;
            animation: leg-swing 0.55s ease-in-out infinite;
        }
        .leg.phase-b { animation-delay: -0.275s; }
        .leg.slow   { animation-duration: 0.85s; }
        .leg.slow.phase-b { animation-delay: -0.425s; }
        .leg.fast   { animation-duration: 0.42s; }
        .leg.fast.phase-b { animation-delay: -0.21s; }
        .stage.down .leg { animation: none; transform: rotate(0); }
        @keyframes leg-swing {
            0%,100% { transform: rotate(22deg); }
            50%     { transform: rotate(-22deg); }
        }

        /* tail wag */
        .tail {
            transform-box: fill-box;
            transform-origin: left center;
            animation: tail-wag 0.85s ease-in-out infinite;
        }
        .stage.down .tail { animation: none; }
        @keyframes tail-wag {
            0%,100% { transform: rotate(-4deg); }
            50%     { transform: rotate(8deg); }
        }

        /* ear flap (elephant) */
        .ear {
            transform-box: fill-box;
            transform-origin: right top;
            animation: ear-flap 0.55s ease-in-out infinite;
        }
        .stage.down .ear { animation: none; }
        @keyframes ear-flap {
            0%,100% { transform: rotate(-5deg); }
            50%     { transform: rotate(8deg); }
        }

        /* breathing belly while sleeping */
        .breath {
            transform-box: fill-box;
            transform-origin: center;
            animation: breathe 4.2s ease-in-out infinite;
        }
        .breath.slow { animation-duration: 5.5s; }
        .breath.off-1 { animation-delay: -1.1s; }
        .breath.off-2 { animation-delay: -2.5s; }
        .breath.off-3 { animation-delay: -3.6s; }
        @keyframes breathe {
            0%,100% { transform: scale(1, 1); }
            50%     { transform: scale(1.025, 1.07); }
        }

        /* a single closed eye blinking very rarely */
        .blink {
            transform-box: fill-box;
            transform-origin: center;
            animation: blink 6s ease-in-out infinite;
        }
        @keyframes blink {
            0%,96%,100% { transform: scaleY(1); }
            98%         { transform: scaleY(0.4); }
        }

        /* sleeping Z's float up & sway */
        .zzz {
            opacity: 0;
            animation: zzz 4s ease-in-out infinite;
            transform-box: fill-box;
            transform-origin: center;
        }
        .stage.down .zzz { opacity: 1; }
        @keyframes zzz {
            0%   { transform: translate(0,   0)   scale(0.55); opacity: 0; }
            15%  { opacity: 1; }
            40%  { transform: translate(8px, -18px) scale(0.85); }
            70%  { transform: translate(-6px,-32px) scale(1.05); }
            100% { transform: translate(4px, -48px) scale(1.20); opacity: 0; }
        }

        /* ============================= */
        /*    Center label               */
        /* ============================= */
        .label {
            position: absolute;
            top: 22%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            user-select: none;
            pointer-events: none;
        }
        .label .big {
            font-size: clamp(48px, 11vw, 160px);
            font-weight: 800;
            letter-spacing: 0.04em;
            color: var(--label-fg);
            text-shadow:
                0 4px 16px rgba(0,0,0,0.45),
                0 0 80px var(--label-glow);
            line-height: 1;
        }

        /* hide some animals on small screens to keep things tidy */
        @media (max-width: 700px) {
            .animal-zebra, .animal-lion, .cloud-2 { display: none; }
        }
        @media (max-width: 460px) {
            .animal-elephant { display: none; }
        }
    </style>
</head>
<body>

<div id="stage" class="stage unknown">

    <!-- ────────── SCENE: layered SVG ────────── -->
    <svg class="scene" viewBox="0 0 1200 600"
         preserveAspectRatio="xMidYMid slice"
         aria-hidden="true">

        <!-- Sun / Moon -->
        <g class="celestial">
            <circle cx="990" cy="135" r="78" fill="var(--sun-glow)" opacity="0.35"/>
            <circle cx="990" cy="135" r="58" fill="var(--sun-glow)" opacity="0.55"/>
            <circle cx="990" cy="135" r="42" fill="var(--sun)"/>
            <circle class="moon-crater" cx="980" cy="125" r="6" fill="#a4a89c" opacity="0.4"/>
            <circle class="moon-crater" cx="1000" cy="148" r="4" fill="#a4a89c" opacity="0.4"/>
            <circle class="moon-crater" cx="996" cy="118" r="3" fill="#a4a89c" opacity="0.4"/>
        </g>

        <!-- Stars -->
        <g class="stars">
            <circle class="star" cx="120"  cy="60"  r="1.5" fill="#fff" style="animation-delay: 0s"/>
            <circle class="star" cx="220"  cy="110" r="1.0" fill="#fff" style="animation-delay: 0.5s"/>
            <circle class="star" cx="350"  cy="40"  r="1.2" fill="#fff" style="animation-delay: 1s"/>
            <circle class="star" cx="450"  cy="130" r="1.5" fill="#fff" style="animation-delay: 1.5s"/>
            <circle class="star" cx="560"  cy="70"  r="1.0" fill="#fff" style="animation-delay: 2s"/>
            <circle class="star" cx="680"  cy="100" r="1.5" fill="#fff" style="animation-delay: 0.3s"/>
            <circle class="star" cx="820"  cy="55"  r="1.2" fill="#fff" style="animation-delay: 0.8s"/>
            <circle class="star" cx="180"  cy="180" r="1.0" fill="#fff" style="animation-delay: 1.3s"/>
            <circle class="star" cx="1100" cy="80"  r="1.3" fill="#fff" style="animation-delay: 1.7s"/>
            <circle class="star" cx="60"   cy="160" r="1.0" fill="#fff" style="animation-delay: 2.2s"/>
            <circle class="star" cx="290"  cy="200" r="0.8" fill="#fff" style="animation-delay: 0.6s"/>
            <circle class="star" cx="730"  cy="190" r="1.0" fill="#fff" style="animation-delay: 1.2s"/>
        </g>

        <!-- Clouds -->
        <g class="cloud cloud-1" transform="translate(0,0)">
            <ellipse cx="200" cy="170" rx="60" ry="14" fill="#fff5dc" opacity="0.45"/>
            <ellipse cx="240" cy="160" rx="40" ry="10" fill="#fff5dc" opacity="0.45"/>
        </g>
        <g class="cloud cloud-2" transform="translate(0,0)" style="animation-delay: -30s">
            <ellipse cx="700" cy="120" rx="80" ry="16" fill="#fff5dc" opacity="0.40"/>
            <ellipse cx="760" cy="110" rx="50" ry="12" fill="#fff5dc" opacity="0.40"/>
        </g>

        <!-- Distant mountains -->
        <g class="layer layer-mtn">
            <path d="M0,400 L120,300 L220,360 L340,260 L460,340 L580,290 L700,370 L820,310 L940,360 L1080,300 L1200,360 L1200,500 L0,500 Z
                     M1200,400 L1320,300 L1420,360 L1540,260 L1660,340 L1780,290 L1900,370 L2020,310 L2140,360 L2280,300 L2400,360 L2400,500 L1200,500 Z"
                  fill="var(--mtn-far)" opacity="0.85"/>
        </g>

        <!-- ────────── GROUND — three tiers ────────── -->
        <!-- Back tier (lightest, trees stand here): y=420 down to y=440 -->
        <rect x="0" y="420" width="2400" height="20" fill="var(--ground-back)"/>
        <!-- subtle line where back meets middle -->
        <rect x="0" y="438" width="2400" height="2" fill="#000" opacity="0.12"/>
        <!-- Middle tier (animals walk here): y=440 down to y=480 -->
        <rect x="0" y="440" width="2400" height="40" fill="var(--ground-mid)"/>
        <rect x="0" y="478" width="2400" height="2" fill="#000" opacity="0.18"/>
        <!-- Front tier (darkest, foreground): y=480 to bottom -->
        <rect x="0" y="480" width="2400" height="200" fill="var(--ground-front)"/>

        <!-- Trees / acacia silhouettes — STAND ON BACK TIER (base at y=420) -->
        <g class="layer layer-tree">
            <!-- Tile 1 -->
            <g transform="translate(80,420)">
                <line x1="0" y1="0" x2="0" y2="-50" stroke="var(--tree-far)" stroke-width="3"/>
                <ellipse cx="0" cy="-55" rx="35" ry="10" fill="var(--tree-far)"/>
                <ellipse cx="-15" cy="-62" rx="22" ry="6" fill="var(--tree-far)"/>
            </g>
            <g transform="translate(380,420)">
                <line x1="0" y1="0" x2="0" y2="-65" stroke="var(--tree-near)" stroke-width="4"/>
                <ellipse cx="0" cy="-72" rx="48" ry="14" fill="var(--tree-near)"/>
                <ellipse cx="20" cy="-82" rx="26" ry="8" fill="var(--tree-near)"/>
            </g>
            <g transform="translate(720,420)">
                <line x1="0" y1="0" x2="0" y2="-55" stroke="var(--tree-far)" stroke-width="3"/>
                <ellipse cx="0" cy="-60" rx="40" ry="11" fill="var(--tree-far)"/>
            </g>
            <g transform="translate(1020,420)">
                <line x1="0" y1="0" x2="0" y2="-70" stroke="var(--tree-near)" stroke-width="4"/>
                <ellipse cx="0" cy="-78" rx="52" ry="15" fill="var(--tree-near)"/>
                <ellipse cx="-22" cy="-88" rx="28" ry="9" fill="var(--tree-near)"/>
            </g>
            <!-- Tile 2 -->
            <g transform="translate(1280,420)">
                <line x1="0" y1="0" x2="0" y2="-50" stroke="var(--tree-far)" stroke-width="3"/>
                <ellipse cx="0" cy="-55" rx="35" ry="10" fill="var(--tree-far)"/>
                <ellipse cx="-15" cy="-62" rx="22" ry="6" fill="var(--tree-far)"/>
            </g>
            <g transform="translate(1580,420)">
                <line x1="0" y1="0" x2="0" y2="-65" stroke="var(--tree-near)" stroke-width="4"/>
                <ellipse cx="0" cy="-72" rx="48" ry="14" fill="var(--tree-near)"/>
                <ellipse cx="20" cy="-82" rx="26" ry="8" fill="var(--tree-near)"/>
            </g>
            <g transform="translate(1920,420)">
                <line x1="0" y1="0" x2="0" y2="-55" stroke="var(--tree-far)" stroke-width="3"/>
                <ellipse cx="0" cy="-60" rx="40" ry="11" fill="var(--tree-far)"/>
            </g>
            <g transform="translate(2220,420)">
                <line x1="0" y1="0" x2="0" y2="-70" stroke="var(--tree-near)" stroke-width="4"/>
                <ellipse cx="0" cy="-78" rx="52" ry="15" fill="var(--tree-near)"/>
                <ellipse cx="-22" cy="-88" rx="28" ry="9" fill="var(--tree-near)"/>
            </g>
        </g>

        <!-- Grass tufts on the BACK tier (small, behind animals) -->
        <g class="layer layer-grass-back" opacity="0.7">
            <g fill="var(--grass-back)">
                <path d="M30,432 l4,-8 l3,8 l3,-6 l3,6 z"/>
                <path d="M210,432 l4,-9 l3,9 l3,-7 l3,7 z"/>
                <path d="M460,432 l4,-7 l3,7 l3,-6 l3,6 z"/>
                <path d="M620,432 l4,-9 l3,9 l3,-6 l3,6 z"/>
                <path d="M880,432 l4,-8 l3,8 l3,-6 l3,6 z"/>
                <path d="M1080,432 l4,-9 l3,9 l3,-6 l3,6 z"/>
            </g>
            <g fill="var(--grass-back)" transform="translate(1200,0)">
                <path d="M30,432 l4,-8 l3,8 l3,-6 l3,6 z"/>
                <path d="M210,432 l4,-9 l3,9 l3,-7 l3,7 z"/>
                <path d="M460,432 l4,-7 l3,7 l3,-6 l3,6 z"/>
                <path d="M620,432 l4,-9 l3,9 l3,-6 l3,6 z"/>
                <path d="M880,432 l4,-8 l3,8 l3,-6 l3,6 z"/>
                <path d="M1080,432 l4,-9 l3,9 l3,-6 l3,6 z"/>
            </g>
        </g>

        <!-- Grass tufts on the MIDDLE tier (where animals walk) -->
        <g class="layer layer-grass-mid">
            <g fill="var(--grass-mid)" opacity="0.85">
                <path d="M30,460 l5,-12 l3,12 l4,-10 l3,10 z"/>
                <path d="M150,463 l5,-15 l3,15 l4,-12 l3,12 z"/>
                <path d="M270,460 l5,-10 l3,10 l4,-8 l3,8 z"/>
                <path d="M400,465 l4,-13 l3,13 l3,-9 l3,9 z"/>
                <path d="M540,460 l5,-15 l4,15 l4,-12 l3,12 z"/>
                <path d="M680,463 l4,-10 l3,10 l3,-8 l3,8 z"/>
                <path d="M820,460 l5,-14 l3,14 l4,-10 l3,10 z"/>
                <path d="M970,464 l4,-12 l3,12 l3,-9 l3,9 z"/>
                <path d="M1100,460 l5,-12 l3,12 l4,-10 l3,10 z"/>
            </g>
            <g fill="var(--grass-mid)" opacity="0.85" transform="translate(1200,0)">
                <path d="M30,460 l5,-12 l3,12 l4,-10 l3,10 z"/>
                <path d="M150,463 l5,-15 l3,15 l4,-12 l3,12 z"/>
                <path d="M270,460 l5,-10 l3,10 l4,-8 l3,8 z"/>
                <path d="M400,465 l4,-13 l3,13 l3,-9 l3,9 z"/>
                <path d="M540,460 l5,-15 l4,15 l4,-12 l3,12 z"/>
                <path d="M680,463 l4,-10 l3,10 l3,-8 l3,8 z"/>
                <path d="M820,460 l5,-14 l3,14 l4,-10 l3,10 z"/>
                <path d="M970,464 l4,-12 l3,12 l3,-9 l3,9 z"/>
                <path d="M1100,460 l5,-12 l3,12 l4,-10 l3,10 z"/>
            </g>
        </g>

        <!-- ────────── ANIMALS — feet on MIDDLE tier (y=440) ────────── -->

        <!-- GIRAFFE — feet at y=440 → translate y = 364 -->
        <g class="animal animal-giraffe" transform="translate(180, 364)">
            <g class="pose-running">
                <g class="body-bob slow">
                    <ellipse cx="20" cy="26" rx="40" ry="14" fill="var(--animal-1b)" opacity="0.18"/>
                    <ellipse cx="20" cy="20" rx="44" ry="20" fill="var(--animal-1)"/>
                    <ellipse cx="20" cy="32" rx="35" ry="6" fill="#fff" opacity="0.10"/>
                    <ellipse cx="-15" cy="13" rx="5" ry="4" fill="var(--animal-1b)"/>
                    <ellipse cx="-2"  cy="22" rx="4" ry="3" fill="var(--animal-1b)"/>
                    <ellipse cx="8"   cy="10" rx="3.5" ry="3" fill="var(--animal-1b)"/>
                    <ellipse cx="18"  cy="20" rx="5" ry="3.5" fill="var(--animal-1b)"/>
                    <ellipse cx="30"  cy="11" rx="4" ry="3" fill="var(--animal-1b)"/>
                    <ellipse cx="40"  cy="22" rx="4.5" ry="3.5" fill="var(--animal-1b)"/>
                    <ellipse cx="52"  cy="14" rx="3" ry="2.5" fill="var(--animal-1b)"/>
                    <path d="M48,2 L52,-92 L66,-94 L62,4 Z" fill="var(--animal-1)"/>
                    <ellipse cx="56" cy="-15" rx="3.5" ry="3" fill="var(--animal-1b)"/>
                    <ellipse cx="58" cy="-35" rx="3" ry="2.5" fill="var(--animal-1b)"/>
                    <ellipse cx="58" cy="-55" rx="3.5" ry="3" fill="var(--animal-1b)"/>
                    <ellipse cx="60" cy="-75" rx="3" ry="2.5" fill="var(--animal-1b)"/>
                    <path d="M53,-90 q1,-4 -2,-6 M55,-70 q1,-4 -2,-6 M56,-50 q1,-4 -2,-6 M57,-30 q1,-4 -2,-6"
                          stroke="var(--animal-1b)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
                    <ellipse cx="64" cy="-100" rx="13" ry="9" fill="var(--animal-1)"/>
                    <ellipse cx="74" cy="-99" rx="5" ry="3.5" fill="var(--animal-1b)" opacity="0.5"/>
                    <circle cx="76" cy="-99" r="0.8" fill="#1a1410"/>
                    <ellipse cx="65" cy="-103" rx="1.6" ry="1.2" fill="#fff"/>
                    <circle cx="65.5" cy="-103" r="0.9" fill="#1a1410"/>

                    <ellipse cx="22" cy="14" rx="3" ry="2.5" transform="rotate(-30 22 14)"/>
                    <ellipse cx="50" cy="14" rx="3" ry="2.5" transform="rotate(20 50 14)"/>
                    <ellipse cx="22" cy="30" rx="3" ry="2.5" transform="rotate(30 22 30)"/>
                    <ellipse cx="50" cy="30" rx="3" ry="2.5" transform="rotate(-20 50 30)"/>
                </g>
                <!-- snout -->
                <ellipse cx="44" cy="24" rx="5" ry="3.5" fill="var(--animal-4)"/>
                <ellipse cx="46" cy="24" rx="1.4" ry="1" fill="#1a1410"/>
                <!-- closed eyes -->
                <path class="blink" d="M32,22 q2,1.5 4,0" stroke="#1a1410" stroke-width="1.2"
                      fill="none" stroke-linecap="round"/>
                <path class="blink" d="M40,22 q2,1.5 4,0" stroke="#1a1410" stroke-width="1.2"
                      fill="none" stroke-linecap="round"/>
                <!-- whiskers (still visible) -->
                <path d="M48,26 l8,-1 M48,28 l8,1" stroke="#fff" stroke-width="0.5" opacity="0.45"/>
                <!-- tail curling around -->
                <path d="M-44,32 q-14,-2 -16,8 q-2,8 6,8" stroke="var(--animal-4)"
                      stroke-width="3" fill="none" stroke-linecap="round"/>
                <ellipse cx="-54" cy="48" rx="3" ry="4" fill="var(--animal-4b)"/>
                <!-- Z's -->
                <text class="zzz" x="56" y="0" font-size="20" font-weight="bold"
                      fill="var(--label-fg)" style="animation-delay: 0.8s">z</text>
                <text class="zzz" x="62" y="-16" font-size="14" font-weight="bold"
                      fill="var(--label-fg)" style="animation-delay: 2.0s">z</text>
            </g>
        </g>

        <!-- foreground grass blades on the FRONT tier (very fast parallax) -->
        <g class="layer layer-fg" opacity="0.7">
            <g fill="var(--ground-front)">
                <path d="M0,540 l4,-22 l3,22 l3,-18 l3,18 z" transform="translate(60,0)"/>
                <path d="M0,545 l4,-26 l3,26 l3,-20 l3,20 z" transform="translate(220,0)"/>
                <path d="M0,540 l4,-22 l3,22 l3,-18 l3,18 z" transform="translate(420,0)"/>
                <path d="M0,545 l4,-26 l3,26 l3,-20 l3,20 z" transform="translate(640,0)"/>
                <path d="M0,540 l4,-22 l3,22 l3,-18 l3,18 z" transform="translate(880,0)"/>
                <path d="M0,545 l4,-26 l3,26 l3,-20 l3,20 z" transform="translate(1080,0)"/>
                <path d="M0,540 l4,-22 l3,22 l3,-18 l3,18 z" transform="translate(1260,0)"/>
                <path d="M0,545 l4,-26 l3,26 l3,-20 l3,20 z" transform="translate(1420,0)"/>
                <path d="M0,540 l4,-22 l3,22 l3,-18 l3,18 z" transform="translate(1620,0)"/>

                <path d="M0,545 l4,-26 l3,26 l3,-20 l3,20 z" transform="translate(2280,0)"/>
            </g>
        </g>
    </svg>

    <!-- Single label, in the sky -->
    <div class="label">
        <div class="big" id="labelBig">…</div>
    </div>
</div>

<script>
const stage    = document.getElementById("stage");
const labelBig = document.getElementById("labelBig");

let lastState = null;

async function poll() {
    let state = "unreachable";
    try {
        const r = await fetch("/api/status", { cache: "no-store" });
        if (r.ok) {
            const j = await r.json();
            state = j.state || (j.ok ? "running" : "down");
        }
    } catch {
        state = "unreachable";
    }
    apply(state);
}

function apply(state) {
    if (state === lastState) return;
    lastState = state;
    stage.classList.remove("running", "down", "unknown");
    if (state === "running") {
        stage.classList.add("running");
        labelBig.textContent = "Running";
    } else if (state === "sleeping" || state === "unreachable" || state === "down") {
        stage.classList.add("down");
        labelBig.textContent = "Sleeping";
    } else {
        stage.classList.add("unknown");
        labelBig.textContent = "…";
    }
}

document.addEventListener("visibilitychange", () => {
    if (document.hidden) stage.style.animationPlayState = "paused";
    else                 stage.style.animationPlayState = "running";
});

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
